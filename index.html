<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#07090f;color:#e2e8f0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#07090f}
::-webkit-scrollbar-thumb{background:#1e3055;border-radius:3px}
input,select,textarea,button{font-family:inherit}
a{color:#60a5fa;text-decoration:none}
a:hover{text-decoration:underline}

/* ── COMPONENTS ── */
.tab-btn{padding:9px 18px;cursor:pointer;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:#64748b;transition:all 0.15s;white-space:nowrap}
.tab-btn.active{color:#60a5fa;border-bottom-color:#60a5fa}
.card{background:#0d1320;border:1px solid #172035;border-radius:10px;padding:13px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;margin-right:3px;margin-bottom:3px}
.inp{background:#0a1020;border:1px solid #172035;border-radius:7px;padding:7px 11px;color:#e2e8f0;font-size:12px;width:100%;outline:none}
.inp:focus{border-color:#2563eb}
.sel{background:#0a1020;border:1px solid #172035;border-radius:7px;padding:7px 11px;color:#e2e8f0;font-size:12px;width:100%;outline:none;cursor:pointer}
.btn{padding:6px 13px;font-size:11px;font-weight:600;border:none;border-radius:7px;cursor:pointer;transition:all 0.15s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#1d4ed8;color:#fff}.btn-primary:hover:not(:disabled){background:#2563eb}
.btn-ghost{background:#172035;color:#94a3b8}.btn-ghost:hover{background:#1e2d4a}
.btn-green{background:#064e3b;color:#34d399}.btn-green:hover{background:#065f46}
.btn-purple{background:#2d1b4a;color:#a78bfa}.btn-purple:hover{background:#3d2060}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #1e3a5f;border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite}
.fade-in{animation:fadeIn 0.2s ease}

/* ── LAYOUT ── */
#root{display:flex;flex-direction:column;min-height:100vh}
.header{background:#080c17;border-bottom:1px solid #172035;padding:11px 20px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.main{padding:16px 20px;flex:1;max-width:1200px;margin:0 auto;width:100%}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .grid-3{grid-template-columns:1fr 1fr!important}
  .main{padding:10px}
  .header{padding:8px 12px 0}
}
</style>
</head>

const API_KEY=()=>window.ANTHROPIC_API_KEY||'';

async function callClaude(system,userContent,useWebSearch=false){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:userContent}]};
  if(useWebSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":API_KEY(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error");}
  const data=await res.json();
  return data.content?.map(c=>c.text||"").filter(Boolean).join("")||"";
}

function exportCSV(data,filename){
  if(!data.length)return;
  const keys=["name","type","mfr","base","filler","fpct","rec","apps","tens","flex","hdt","den","izod","cti","elong","meltLow","meltHigh","moldLow","moldHigh","dryTemp","dryHrs"];
  const rows=data.map(p=>[p.name,p.type,p.mfr,p.base,p.filler||"Unfilled",p.fpct,p.rec,(p.apps||[]).join("|"),
    p.props?.tens??"",p.props?.flex??"",p.props?.hdt??"",p.props?.den??"",p.props?.izod??"",p.props?.cti??"",p.props?.elong??"",
    p.proc?.melt?.[0]??"",p.proc?.melt?.[1]??"",p.proc?.mold?.[0]??"",p.proc?.mold?.[1]??"",p.proc?.dry?.[0]??"",p.proc?.dry?.[1]??""]);
  const csv=[keys.join(","),...rows.map(r=>r.map(v=>String(v??"")))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function PropBar({label,value,max,unit,color="#3b82f6"}){
  const pct=Math.min(100,(value/max)*100);
  return(
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#94a3b8",marginBottom:2}}>
        <span>{label}</span><span style={{color:"#e2e8f0",fontWeight:600}}>{value} {unit}</span>
      </div>
      <div style={{height:3,background:"#172035",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3}}/>
      </div>
    </div>
  );
}

function DatabaseTab(){
  const [allData,setAllData]=useState(SEED_DB);
  const [search,setSearch]=useState("");
  const [typeF,setTypeF]=useState("All");
  const [mfrF,setMfrF]=useState("All");
  const [baseF,setBaseF]=useState("All");
  const [fillerF,setFillerF]=useState("All");
  const [sortBy,setSortBy]=useState("name");
  const [cmp,setCmp]=useState([]);
  const [expanded,setExpanded]=useState({});
  const [liveQ,setLiveQ]=useState("");
  const [liveLoading,setLiveLoading]=useState(false);
  const [liveStatus,setLiveStatus]=useState("");
  const [noKey,setNoKey]=useState(false);

  const allMfrs=useMemo(()=>["All",...new Set(allData.map(p=>p.mfr))].sort(),[allData]);
  const allBases=useMemo(()=>["All",...new Set(allData.map(p=>p.base))].sort(),[allData]);
  const allFillers=useMemo(()=>["All","None",...new Set(allData.map(p=>p.filler).filter(Boolean))].sort(),[allData]);
  const allTypes=["All","Engineering","Super-Engineering","General","Rubber"];

  const filtered=useMemo(()=>{
    let r=allData.filter(p=>{
      if(search&&![p.name,p.base,p.mfr].some(s=>s?.toLowerCase().includes(search.toLowerCase())))return false;
      if(typeF!=="All"&&p.type!==typeF)return false;
      if(mfrF!=="All"&&p.mfr!==mfrF)return false;
      if(baseF!=="All"&&p.base!==baseF)return false;
      if(fillerF!=="All"){if(fillerF==="None"&&p.filler)return false;if(fillerF!=="None"&&p.filler!==fillerF)return false;}
      return true;
    });
    const sk={name:(a,b)=>a.name.localeCompare(b.name),tens:(a,b)=>(b.props?.tens||0)-(a.props?.tens||0),hdt:(a,b)=>(b.props?.hdt||0)-(a.props?.hdt||0),den:(a,b)=>(a.props?.den||0)-(b.props?.den||0)};
    return [...r].sort(sk[sortBy]||sk.name);
  },[allData,search,typeF,mfrF,baseF,fillerF,sortBy]);

  const fetchLive=async()=>{
    if(!liveQ.trim()||liveLoading)return;
    if(!API_KEY()||API_KEY()==='YOUR_ANTHROPIC_API_KEY_HERE'){setNoKey(true);return;}
    setLiveLoading(true);setLiveStatus("Searching manufacturer catalogs...");
    try{
      const sys=`You are a polymer materials expert. Find real commercial polymer grades matching the query by searching manufacturer websites, UL Prospector, SpecialChem, and MatWeb.
Return ONLY a valid JSON array — no markdown, no preamble. Each item:
{id,name,mfr,base,filler,fpct,type,rec,apps,proc:{melt:[min,max],mold:[min,max],dry:[temp,hours]},props:{tens,flex,hdt,den,izod,cti,elong}}
- id: "live_XXX" unique string
- type: "Engineering" or "Super-Engineering" or "General" or "Rubber"
- filler: "GF","CF","MF", or null. fpct: 0 if none
- rec: recycled % (0 if none)
- proc.dry: [0,0] if no drying required
- props: numbers or null. tens=MPa,flex=MPa,hdt=°C,den=g/cm³,izod=kJ/m²,cti=V,elong=%
Find 10-20 real grades. Return only the JSON array.`;
      const text=await callClaude(sys,`Find commercial polymer grades: ${liveQ}`,true);
      const match=text.match(/\[[\s\S]*?\]/);
      let parsed=[];
      if(match){try{parsed=JSON.parse(match[0]);}catch(e){}}
      if(parsed.length){
        setAllData(prev=>{
          const names=new Set(prev.map(p=>p.name.toLowerCase()));
          const fresh=parsed.filter(p=>p?.name&&p?.mfr&&!names.has(p.name.toLowerCase()));
          return [...prev,...fresh];
        });
        setLiveStatus(`✓ Added grades from live search. Total: ${allData.length+parsed.length}`);
      }else{setLiveStatus("No new grades found — try a different query.");}
    }catch(e){setLiveStatus(`Error: ${e.message}`);}
    setLiveLoading(false);
    setTimeout(()=>setLiveStatus(""),5000);
  };

  const toggleCmp=p=>setCmp(prev=>prev.find(x=>x.id===p.id)?prev.filter(x=>x.id!==p.id):prev.length<5?[...prev,p]:prev);
  const toggleExp=id=>setExpanded(prev=>({...prev,[id]:!prev[id]}));

  return(
    <div>
      {noKey&&(
        <div style={{background:"#2e1e10",border:"1px solid #f97316",borderRadius:8,padding:12,marginBottom:12,fontSize:12}}>
          <strong style={{color:"#f97316"}}>API Key not configured.</strong>
          <span style={{color:"#94a3b8",marginLeft:6}}>Edit index.html and replace <code style={{color:"#fbbf24"}}>YOUR_ANTHROPIC_API_KEY_HERE</code> with your key from <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. See README.md for details.</span>
        </div>
      )}
      <div style={{background:"#060c1a",border:"1px solid #1e3a5f",borderRadius:10,padding:12,marginBottom:12}}>
        <div style={{fontSize:10,color:"#60a5fa",fontWeight:700,marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Live Fetch — Expand Database from Manufacturer Catalogs</div>
        <div style={{display:"flex",gap:7}}>
          <input className="inp" style={{flex:1}} placeholder='e.g. "Covestro Makrolon PC" · "Envalior Akulon PA6" · "Toray Torelina PPS" · "LANXESS Durethan" · "Solvay Torlon PAI"' value={liveQ} onChange={e=>setLiveQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&fetchLive()}/>
          <button onClick={fetchLive} disabled={liveLoading} className="btn btn-primary">{liveLoading?<span style={{display:"flex",alignItems:"center",gap:5}}><span className="spinner"/>Fetching...</span>:"Fetch Grades"}</button>
        </div>
        {liveStatus&&<div style={{fontSize:11,marginTop:6,color:liveStatus.startsWith("✓")?"#34d399":"#94a3b8"}}>{liveStatus}</div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:8}} className="grid-3">
        <input className="inp" placeholder="Search name, base, manufacturer..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="sel" value={typeF} onChange={e=>setTypeF(e.target.value)}>{allTypes.map(t=><option key={t}>{t==="All"?"All Types":t}</option>)}</select>
        <select className="sel" value={mfrF} onChange={e=>setMfrF(e.target.value)}>{allMfrs.map(m=><option key={m}>{m==="All"?"All Manufacturers":m}</option>)}</select>
        <select className="sel" value={baseF} onChange={e=>setBaseF(e.target.value)}>{allBases.map(b=><option key={b}>{b==="All"?"All Base Polymers":b}</option>)}</select>
        <select className="sel" value={fillerF} onChange={e=>setFillerF(e.target.value)}>{allFillers.map(f=><option key={f}>{f==="All"?"All Fillers":f}</option>)}</select>
        <select className="sel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">Sort: A–Z</option><option value="tens">Sort: Tensile ↓</option>
          <option value="hdt">Sort: HDT ↓</option><option value="den">Sort: Density ↑</option>
        </select>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
        <span style={{fontSize:11,color:"#475569"}}><span style={{color:"#60a5fa",fontWeight:700}}>{allData.length}</span> total · <span style={{color:"#94a3b8"}}>{filtered.length}</span> shown</span>

function AIChat(){
  const [msgs,setMsgs]=useState([{role:"assistant",content:"Hello! I'm PolymerIQ with live web search.\n\nI can search manufacturer catalogs, compare grades, recommend materials for applications, and find research papers.\n\nTry:\n- *Best PPS grade for EV battery housing?*\n- *Compare Victrex 450G vs Evonik Vestakeep for medical*\n- *All commercial PEKK grades available?*\n- *PA11 vs PA12 for subsea flexible pipe*"}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [noKey,setNoKey]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    if(!API_KEY()||API_KEY()==='YOUR_ANTHROPIC_API_KEY_HERE'){setNoKey(true);return;}
    const userMsg=input.trim();setInput("");
    setMsgs(prev=>[...prev,{role:"user",content:userMsg}]);
    setLoading(true);
    try{
      const history=msgs.slice(-10).map(m=>({role:m.role,content:m.content}));
      const text=await callClaude(
        `You are PolymerIQ, an expert polymer materials intelligence assistant with live web search. You have a seed database of ${SEED_DB.length} grades. Use web search to find real datasheets, manufacturer pages, grade comparisons, and research. Be concise, technical, and accurate. Bold **material names**. Cite manufacturer and exact grade name.`,
        [...history,{role:"user",content:userMsg}].map(m=>`${m.role}: ${m.content}`).join("\n"),true
      );
      setMsgs(prev=>[...prev,{role:"assistant",content:text||"No response generated."}]);
    }catch(e){setMsgs(prev=>[...prev,{role:"assistant",content:`Error: ${e.message}`}]);}
    setLoading(false);
  };

  const sugg=["Best PPS for EV battery?","PEEK grades for medical implants","Compare PA6 vs PA66 GF30","Torlon PAI properties","LCP dielectric for 5G","PA11 vs PA12 subsea"];
  const renderMsg=content=>content.split('\n').map((line,i)=>{
    const h=line.replace(/\*\*(.*?)\*\*/g,'<strong style="color:#60a5fa">$1</strong>').replace(/\*(.*?)\*/g,'<em style="color:#94a3b8">$1</em>');
    if(/^[-•]\s/.test(line))return<div key={i} style={{paddingLeft:12,marginBottom:3,lineHeight:1.6}}>• <span dangerouslySetInnerHTML={{__html:h.replace(/^[-•]\s/,"")}}/></div>;
    if(line.startsWith('# '))return<div key={i} style={{fontWeight:700,fontSize:13,color:"#60a5fa",marginTop:10,marginBottom:4}}>{line.slice(2)}</div>;
    if(line.startsWith('## '))return<div key={i} style={{fontWeight:600,fontSize:12,color:"#93c5fd",marginTop:8,marginBottom:3}}>{line.slice(3)}</div>;
    if(!line.trim())return<div key={i} style={{height:4}}/>;
    return<div key={i} style={{marginBottom:2,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:h}}/>;
  });

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)",minHeight:500}}>
      {noKey&&<div style={{background:"#2e1e10",border:"1px solid #f97316",borderRadius:8,padding:10,marginBottom:10,fontSize:11,color:"#94a3b8"}}>API key not configured. Edit index.html. See README.md.</div>}
      <div style={{flex:1,overflowY:"auto",paddingRight:3,marginBottom:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{marginBottom:10,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"88%",padding:"10px 13px",borderRadius:m.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",background:m.role==="user"?"#1d4ed8":"#0d1320",border:m.role==="user"?"none":"1px solid #172035",fontSize:12,lineHeight:1.6,color:"#e2e8f0"}}>
              {m.role==="assistant"?renderMsg(m.content):m.content}
            </div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:5,padding:"10px 13px",background:"#0d1320",border:"1px solid #172035",borderRadius:"12px 12px 12px 4px",width:"fit-content",marginBottom:10}}>
          {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#3b82f6",animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
        </div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
        {sugg.map(s=><button key={s} onClick={()=>setInput(s)} style={{fontSize:10,padding:"3px 9px",background:"#0a1020",border:"1px solid #172035",borderRadius:20,color:"#94a3b8",cursor:"pointer"}}>{s}</button>)}
      </div>
      <div style={{display:"flex",gap:7,alignItems:"center"}}>
        <div style={{fontSize:9,padding:"3px 7px",background:"#064e3b",borderRadius:4,color:"#34d399",whiteSpace:"nowrap",flexShrink:0}}>Web ON</div>
        <input className="inp" style={{flex:1}} placeholder="Ask about polymer materials..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
        <button onClick={send} disabled={loading||!input.trim()} className="btn btn-primary">{loading?"...":"Send"}</button>
      </div>
    </div>
  );
}

        <div style={{fontSize:10,color:"#a78bfa",fontWeight:700,marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Live Research Search</div>
        <div style={{display:"flex",gap:7}}>
          <input className="inp" placeholder="e.g. PEEK recycling 2024, LCP dielectric 5G..." value={liveQ} onChange={e=>setLiveQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchLive()} style={{flex:1}}/>
          <button onClick={searchLive} disabled={liveL} className="btn btn-purple">{liveL?"Searching...":"Search"}</button>
        </div>
        {liveRes.map((r,i)=>(
          <div key={i} style={{marginTop:10,padding:10,background:"#0a1020",borderRadius:8,border:"1px solid #172035"}}>
            <div style={{fontWeight:700,fontSize:11,color:"#e2e8f0",marginBottom:3}}>{r.title}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{r.authors} · <span style={{color:"#a78bfa"}}>{r.journal}</span> · {r.year}</div>
            {r.abstract&&<div style={{fontSize:11,color:"#94a3b8",lineHeight:1.5,marginBottom:5}}>{r.abstract}</div>}
            {r.doi&&<a href={`https://doi.org/${r.doi}`} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#a78bfa"}}>DOI →</a>}
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
        <input className="inp" placeholder="Filter curated articles..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="sel" value={tag} onChange={e=>setTag(e.target.value)}>{allTags.map(t=><option key={t}>{t}</option>)}</select>
      </div>
      <div style={{maxHeight:"calc(100vh - 320px)",overflowY:"auto",paddingRight:3}}>
        {filtered.map(r=>(
          <div key={r.doi} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:11,color:"#e2e8f0",marginBottom:3,lineHeight:1.4}}>{r.title}</div>
                <div style={{fontSize:10,color:"#94a3b8",marginBottom:4}}>{r.authors} · <span style={{color:"#a78bfa"}}>{r.journal}</span> · {r.year}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{r.tags.map(t=><span key={t} style={{fontSize:9,padding:"1px 5px",borderRadius:10,background:"#0a1020",border:"1px solid #172035",color:"#475569"}}>{t}</span>)}</div>
              </div>
              <a href={`https://doi.org/${r.doi}`} target="_blank" rel="noopener noreferrer" style={{marginLeft:10,padding:"4px 9px",background:"#2d1b4a",borderRadius:6,color:"#a78bfa",textDecoration:"none",fontSize:10,whiteSpace:"nowrap",flexShrink:0}}>DOI →</a>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("db");
  const tabs=[{id:"db",label:"Material Database"},{id:"ai",label:"AI Assistant"},{id:"edu",label:"Education"},{id:"research",label:"Research"}];
  return(
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo">
            <div className="logo-icon">⬡</div>
            <div>
              <div style={{fontWeight:800,fontSize:16,color:"#e2e8f0",letterSpacing:"-0.02em"}}>PolymerIQ</div>
              <div style={{fontSize:9,color:"#334155",letterSpacing:"0.06em"}}>MATERIALS INTELLIGENCE PLATFORM</div>
            </div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{fontSize:9,padding:"3px 9px",background:"#064e3b",borderRadius:4,color:"#34d399"}}>Live Fetch ON</div>
            <div style={{fontSize:9,padding:"3px 9px",background:"#1e3a5f",borderRadius:4,color:"#60a5fa"}}>{SEED_DB.length} seed grades · expandable</div>
          </div>
        </div>
        <nav style={{display:"flex",overflowX:"auto"}}>
          {tabs.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </nav>
      </header>
      <main className="main">
        {tab==="db"&&<DatabaseTab/>}
        {tab==="ai"&&<AIChat/>}
        {tab==="edu"&&<EducationTab/>}
        {tab==="research"&&<ResearchTab/>}
      </main>
    </>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
